workflows:
  android-workflow:
    name: PlayTVNow Android Build
    # Usa uma máquina virtual padrão do Codemagic
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Baixar pacotes do Flutter
        script: |
          flutter packages pub get
      - name: Construir o APK (Para instalar direto no celular)
        script: |
          flutter build apk --release
      - name: Construir o AAB (Para a Google Play Store)
        script: |
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/bundle/release/app-release.aab
