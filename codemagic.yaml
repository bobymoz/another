workflows:
  android-workflow:
    name: PlayTVNow Android Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Baixar pacotes do Flutter
        script: |
          flutter packages pub get
      - name: Construir o APK Leve (Separado por arquitetura)
        script: |
          flutter build apk --release --split-per-abi
      - name: Construir o AAB (Para a Google Play Store)
        script: |
          flutter build appbundle --release
    artifacts:
      # Pega o APK para a maioria dos telemóveis modernos (mais leve)
      - build/app/outputs/apk/release/app-arm64-v8a-release.apk
      - build/app/outputs/bundle/release/app-release.aab
