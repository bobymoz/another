workflows:
  android-workflow:
    name: PlayTVNow Android Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Baixar pacotes do Flutter
        script: |
          flutter packages pub get
      - name: Gerar Ícone da Aplicação
        script: |
          flutter pub run flutter_launcher_icons
      - name: Construir o APK e AAB
        script: |
          flutter build apk --release --split-per-abi
          flutter build appbundle --release
      - name: Gerar Assinatura Digital e Assinar (APK e AAB)
        script: |
          # 1. Cria a chave de segurança (Keystore) do PlayTVNow
          keytool -genkey -v -keystore playtvnow.keystore -alias playtvnow -keyalg RSA -keysize 2048 -validity 10000 -storepass "jinoca2026" -keypass "jinoca2026" -dname "CN=PlayTVNow, OU=PlayTVNow, O=PlayTVNow, L=Maputo, ST=Maputo, C=MZ"
          
          # 2. Assinar os APKs para teste no telemóvel
          APKSIGNER=$(ls -d /usr/local/share/android-sdk/build-tools/*/apksigner | sort -r | head -n 1)
          for apk in build/app/outputs/flutter-apk/*-release.apk; do
            $APKSIGNER sign --ks playtvnow.keystore --ks-pass pass:jinoca2026 "$apk"
          done
          
          # 3. A SOLUÇÃO DA GOOGLE PLAY: Assinar o ficheiro AAB!
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore playtvnow.keystore -storepass "jinoca2026" build/app/outputs/bundle/release/app-release.aab playtvnow
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/app-release.aab
