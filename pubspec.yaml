workflows:
  android-workflow:
    name: PlayTVNow Android Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Baixar pacotes do Flutter
        script: |
          flutter packages pub get
      - name: Configurar Anúncios Unity e Gerar Ícone
        script: |
          flutter pub add dev:flutter_launcher_icons
          flutter pub add unity_ads_plugin
          cat <<EOF >> pubspec.yaml
          
          flutter_launcher_icons:
            android: true
            image_path: "assets/logo.png"
          EOF
          flutter pub run flutter_launcher_icons
      - name: Construir o APK Leve (Separado por arquitetura)
        script: |
          flutter build apk --release --split-per-abi
      - name: Construir o AAB (Para a Google Play Store)
        script: |
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/app-release.aab
